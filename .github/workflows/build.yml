name: PixelOS Build

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Install dependencies
  run: |
    sudo apt update
    sudo apt install git-lfs repo bc bison build-essential curl flex g++-multilib \
    gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
    lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev \
    libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc \
    zip zlib1g-dev openjdk-11-jdk

- name: Initialize repo
  run: |
    mkdir pixelos
    cd pixelos
    repo init -u https://github.com/PixelOS-AOSP/manifest.git -b twelve
    repo sync -j2

- name: Clone device tree
  run: |
    cd pixelos
    git clone https://github.com/PixelOS-Devices/device_xiaomi_fleur device/xiaomi/fleur

- name: Build
  run: |
    cd pixelos
    source build/envsetup.sh
    lunch aosp_fleur-userdebug
    make -j2
```
