name: PixelOS Build

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install repo tool
    run: |
      mkdir -p ~/bin
      curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
      chmod a+x ~/bin/repo
      echo "$HOME/bin" >> $GITHUB_PATH

  - name: Test repo
    run: repo --version
```
